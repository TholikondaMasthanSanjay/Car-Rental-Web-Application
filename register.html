<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Fleet | M-DRIVE</title>
    <link rel="stylesheet" href="register-style.css">
</head>
<body>

    <div class="reg-wrapper">
        <div class="reg-card">
            <div class="reg-header">
                <div class="logo">M-<span>DRIVE</span></div>
                <h2>Create Pilot Profile</h2>
                <p>Register your credentials to start booking.</p>
            </div>

            <form id="registrationForm">
                <div class="form-grid">
                    <div class="input-group">
                        <input type="text" id="fullname" required>
                        <label>Full Name</label>
                    </div>

                    <div class="input-group">
                        <input type="tel" id="phone" required>
                        <label>Phone Number</label>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" required>
                        <label>Email Address</label>
                    </div>

                    <div class="input-group">
                        <input type="text" id="license" required>
                        <label>Driving License No.</label>
                    </div>

                    <div class="input-group full-width">
                        <input type="password" id="pass" required>
                        <label>Create Password</label>
                    </div>
                </div>

                <div class="terms">
                    <label>
                        <input type="checkbox" required> 
                        I agree to the <span>Rental Terms & Conditions</span>
                    </label>
                </div>

                <button type="submit" class="reg-btn">REGISTER PROFILE</button>
            </form>

            <div class="reg-footer">
                <p>Already a member? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

</body>
</html>
