<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | M-Drive Elite</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-visual">
            <div class="visual-overlay">
                <div class="logo">M-<span>DRIVE</span></div>
                <h1>Welcome Back, <br>Driver.</h1>
                <p>Login to manage your bookings and access your premium garage.</p>
            </div>
        </div>

        <div class="login-form-section">
            <div class="form-wrapper">
                <h2>Member Login</h2>
                <p class="subtitle">Enter your credentials to ignite your session.</p>

                <form id="loginForm" onsubmit="dashboard(event)">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="name@example.com" required>
                    </div>

                    <div class="input-group">
                        <div class="label-row">
                            <label>Password</label>
                            <a href="#" class="forgot-link">Forgot?</a>
                        </div>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Keep me signed in for 30 days</label>
                    </div>

                    <button type="submit" class="login-btn">GET KEYS</button>
                </form>

                <p class="register-redirect">New to the fleet? <a href="register.html">Create Profile</a></p>
            </div>
        </div>
    </div>

    <script>
        function dashboard(event){
            event.preventDefault();
            window.location.href="dashbord.html"
        }
    </script>
</body>
</html>
